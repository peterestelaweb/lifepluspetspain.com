name: Deploy → Banahosting

on:
  workflow_dispatch:
    inputs:
      deploy_runtime_data:
        description: 'Subir tambien crm/data, crm-care-comfort/data y ventas/data'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'guia.html'
      - 'CNAME'
      - 'assets/**'
      - 'ventas/**'
      - 'crm/**'
      - 'crm-care-comfort/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Preparar versión principal
        env:
          DEPLOY_RUNTIME_DATA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_runtime_data == 'true' }}
        run: |
          mkdir -p public
          cp index.html public/index.html
          cp guia.html public/guia.html
          if [ -d assets ]; then cp -R assets public/; fi
          if [ -d ventas ]; then cp -R ventas public/; fi
          if [ -d crm ]; then cp -R crm public/; fi
          if [ -d crm-care-comfort ]; then cp -R crm-care-comfort public/; fi
          if [ "$DEPLOY_RUNTIME_DATA" != "true" ]; then
            rm -rf public/ventas/data public/crm/data public/crm-care-comfort/data
          fi

      - name: Deploy lifepluspetspain.com (versión completa)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /lifepluspetspain.com/
          local-dir: ./public/
          security: loose
          log-level: standard

      - name: Generar versión neutra (sin formulario, sin tienda)
        env:
          DEPLOY_RUNTIME_DATA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_runtime_data == 'true' }}
        run: |
          mkdir -p neutro
          cp index.html neutro/index.html
          cp guia.html neutro/guia.html
          if [ -d assets ]; then cp -R assets neutro/; fi
          if [ -d ventas ]; then cp -R ventas neutro/; fi
          if [ -d crm ]; then cp -R crm neutro/; fi
          if [ -d crm-care-comfort ]; then cp -R crm-care-comfort neutro/; fi
          if [ "$DEPLOY_RUNTIME_DATA" != "true" ]; then
            rm -rf neutro/ventas/data neutro/crm/data neutro/crm-care-comfort/data
          fi

          python3 - <<'EOF'
          import re
          from pathlib import Path

          for path in [Path('neutro/index.html'), Path('neutro/guia.html')]:
              content = path.read_text(encoding='utf-8')

              content = re.sub(
                  r'<!--\s*NEUTRO-REMOVE-START\s*-->.*?<!--\s*NEUTRO-REMOVE-END\s*-->',
                  '', content, flags=re.DOTALL
              )
              content = re.sub(
                  r'/\*\s*NEUTRO-REMOVE-START\s*\*/.*?/\*\s*NEUTRO-REMOVE-END\s*\*/',
                  '', content, flags=re.DOTALL
              )

              content = content.replace(
                  'https://ww1.lifeplus.com/SHVCB5/M/es/es/web-page/products?search=pets',
                  'https://ww1.lifeplus.com/es/es/web-page/products?search=pets'
              )
              content = re.sub(
                  r'https://ww1\.lifeplus\.com/SHVCB5/M/es/es/product-details/',
                  'https://ww1.lifeplus.com/es/es/product-details/',
                  content
              )
              content = re.sub(r'https://www\.lifeplus\.com/SHVCB5/S/', 'https://www.lifeplus.com/', content)
              content = content.replace('ShopID SHVCB5', 'LifePlus International')
              content = re.sub(r'<strong>SHVCB5</strong>', 'LifePlus International', content)

              path.write_text(content, encoding='utf-8')

          print("Version neutra generada OK")
          EOF

      - name: Deploy vitallinkplus.com (versión neutra)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /lifepluspets.vitallinkplus.com/
          local-dir: ./neutro/
          security: loose
          log-level: standard
