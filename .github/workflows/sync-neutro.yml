name: Sync → Repo Neutro

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'guia.html'
      - 'assets/**'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo SHVCB5
        run: |
          git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git source

      - name: Generar index.html neutro
        run: |
          mkdir -p neutro-build
          cp source/index.html neutro-build/index.html
          cp source/guia.html neutro-build/guia.html
          if [ -d source/assets ]; then cp -R source/assets neutro-build/; fi

          python3 - <<'EOF'
from pathlib import Path
import re

for path in [Path('neutro-build/index.html'), Path('neutro-build/guia.html')]:
    content = path.read_text(encoding='utf-8')

    content = re.sub(
        r'<!--\s*NEUTRO-REMOVE-START\s*-->.*?<!--\s*NEUTRO-REMOVE-END\s*-->',
        '',
        content,
        flags=re.DOTALL
    )
    content = re.sub(
        r'/\*\s*NEUTRO-REMOVE-START\s*\*/.*?/\*\s*NEUTRO-REMOVE-END\s*\*/',
        '',
        content,
        flags=re.DOTALL
    )

    content = content.replace(
        'https://ww1.lifeplus.com/SHVCB5/M/es/es/web-page/products?search=pets',
        'https://ww1.lifeplus.com/es/es/web-page/products?search=pets'
    )
    content = re.sub(r'https://www\.lifeplus\.com/SHVCB5/S/', 'https://www.lifeplus.com/', content)
    content = content.replace('ShopID SHVCB5', 'LifePlus International')
    content = re.sub(r'<strong>SHVCB5</strong>', 'LifePlus International', content)

    path.write_text(content, encoding='utf-8')

print("Bloques NEUTRO-REMOVE eliminados correctamente")
EOF

      - name: Push al repo neutro
        env:
          NEUTRO_TOKEN: ${{ secrets.NEUTRO_TOKEN }}
        run: |
          git clone https://x-access-token:${NEUTRO_TOKEN}@github.com/peterestelaweb/lifepluspetsneutro.git neutro

          cp neutro-build/index.html neutro/index.html
          cp neutro-build/guia.html neutro/guia.html
          if [ -d neutro-build/assets ]; then
            rm -rf neutro/assets
            cp -R neutro-build/assets neutro/assets
          fi

          cd neutro
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html guia.html assets
          git diff --staged --quiet && echo "Sin cambios" || git commit -m "sync: actualizacion automatica desde lifepluspetspain.com"
          git push origin main
